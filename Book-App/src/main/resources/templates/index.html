<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Book Management App</h2>

    <!-- Success Message -->
    <div th:if="${msg}" class="alert alert-success text-center">
        <span th:text="${msg}"></span>
    </div>

    <!-- Add Book Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Add New Book
        </div>
        <div class="card-body">
            <form th:action="@{/addBook}" method="post">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Book Name</label>
                        <input type="text" name="bookName" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Author</label>
                        <input type="text" name="authorName" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" name="bookPrice" class="form-control" required>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success px-4">Add Book</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Book List Table -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            Book List
        </div>
        <div class="card-body">

            <table class="table table-bordered table-hover text-center">
                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Book Name</th>
                        <th>Author</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.bookId}"></td>
                        <td th:text="${book.bookName}"></td>
                        <td th:text="${book.authorName}"></td>
                        <td th:text="${book.bookPrice}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="4" class="text-muted">No books available</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
